<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>GoZap — открыть станцию</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #eaeaea;
      min-height: 100vh;
      padding: 24px;
      line-height: 1.5;
    }
    h1 { font-size: 22px; margin: 0 0 8px; }
    h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.08em; color: #888; margin: 24px 0 8px; }
    .status { font-size: 15px; margin: 12px 0 24px; padding: 12px 16px; border-radius: 10px; background: #1a1a1a; border-left: 3px solid #ffd53f; }
    .status.error { border-left-color: #e10918; color: #ff9aa2; }
    .status.ok { border-left-color: #38d39f; }
    pre {
      background: #111;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 12px;
      font-size: 12px;
      color: #ccc;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    button {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 14px 16px;
      border: 0;
      border-radius: 12px;
      background: #ffd53f;
      color: #181818;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    button.secondary { background: #1a1a1a; color: #eaeaea; border: 1px solid #333; }
    .row { display: flex; gap: 8px; }
    .row button { margin: 0; flex: 1; }
    a { color: #ffd53f; }
  </style>
</head>
<body>
  <h1>GoZap — открыть станцию</h1>
  <div class="status" id="status">Подготовка…</div>

  <div class="row">
    <button id="btn-open">Открыть в приложении</button>
  </div>
  <button class="secondary" id="btn-store">Скачать приложение</button>

  <h2>Параметры URL</h2>
  <pre id="url-dump">…</pre>

  <h2>Fingerprint (для бэка)</h2>
  <pre id="fp-dump">собираем…</pre>

  <h2>Лог</h2>
  <pre id="log"></pre>

  <script>
    const APP_SCHEME = 'gozap';
    const IOS_STORE = 'https://cdn.neowin.com/news/images/uploaded/2024/05/1714800559_ios-logo.jpg';
    const ANDROID_STORE = 'https://avatars.mds.yandex.net/i?id=05efd7ae457e778adad517df1b2a725b_l-5042534-images-thumbs&n=13';
    const FINGERPRINT_ENDPOINT = null;

    const $ = (id) => document.getElementById(id);
    const log = (msg, data) => {
      const ts = new Date().toISOString().slice(11, 23);
      const line = data === undefined ? `[${ts}] ${msg}` : `[${ts}] ${msg} ${JSON.stringify(data)}`;
      $('log').textContent += line + '\n';
      console.log(line);
    };
    const setStatus = (text, kind = '') => {
      const el = $('status');
      el.textContent = text;
      el.className = 'status' + (kind ? ' ' + kind : '');
    };

    function parseUrl() {
      const url = new URL(window.location.href);
      const params = Object.fromEntries(url.searchParams.entries());
      const pathParts = url.pathname.split('/').filter(Boolean);
      const stationCode = params.s || params.station || pathParts[pathParts.length - 1] || null;
      return { url: url.href, params, path: url.pathname, stationCode };
    }

    function detectPlatform() {
      const ua = navigator.userAgent;
      if (/android/i.test(ua)) return 'android';
      if (/iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1)) return 'ios';
      return 'other';
    }

    async function fetchIp() {
      try {
        const r = await fetch('https://api.ipify.org?format=json');
        const data = await r.json();
        return data.ip || null;
      } catch (e) {
        return null;
      }
    }

    function parseOsVersion(ua) {
      const iosMatch = ua.match(/OS (\d+[_.]\d+(?:[_.]\d+)?)\s/i);
      if (iosMatch) return iosMatch[1].replace(/_/g, '.');
      const androidMatch = ua.match(/Android\s(\d+(?:\.\d+){0,2})/i);
      if (androidMatch) return androidMatch[1];
      return null;
    }

    function detectRegion(language) {
      try {
        return new Intl.Locale(language).maximize().region || null;
      } catch (_) {
        const parts = (language || '').split('-');
        return parts.length > 1 ? parts[parts.length - 1].toUpperCase() : null;
      }
    }

    function detectColorScheme() {
      try {
        return matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      } catch (_) {
        return null;
      }
    }

    async function collectFingerprint(stationCode) {
      const platform = detectPlatform();
      const ip = await fetchIp();
      const dpr = window.devicePixelRatio || 1;
      const language = navigator.language || null;
      return {
        stationCode,
        platform,
        osVersion: parseOsVersion(navigator.userAgent),
        userAgent: navigator.userAgent,
        language,
        languagePrimary: language ? language.split('-')[0] : null,
        languages: navigator.languages || [],
        region: detectRegion(language),
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        timezoneOffsetMinutes: new Date().getTimezoneOffset(),
        colorScheme: detectColorScheme(),
        memoryGb: typeof navigator.deviceMemory === 'number' ? navigator.deviceMemory : null,
        cpuCount: typeof navigator.hardwareConcurrency === 'number' ? navigator.hardwareConcurrency : null,
        screen: {
          width: screen.width,
          height: screen.height,
          scale: dpr,
          physicalWidth: Math.round(screen.width * dpr),
          physicalHeight: Math.round(screen.height * dpr),
        },
        viewport: {
          width: window.innerWidth,
          height: window.innerHeight,
        },
        ip,
        referrer: document.referrer || null,
        landingHref: window.location.href,
        capturedAt: new Date().toISOString(),
      };
    }

    function buildDeepLink(stationCode) {
      return `${APP_SCHEME}://station/${encodeURIComponent(stationCode)}`;
    }

    function openInApp(stationCode) {
      const deepLink = buildDeepLink(stationCode);
      log('attempting deep link', { deepLink });
      window.location.href = deepLink;
    }

    function goToStore() {
      const p = detectPlatform();
      const url = p === 'android' ? ANDROID_STORE : IOS_STORE;
      log('redirecting to store', { url });
      window.location.href = url;
    }

    async function sendFingerprintToBackend(fp) {
      if (!FINGERPRINT_ENDPOINT) {
        log('fingerprint endpoint not configured — skip send');
        return;
      }
      try {
        const r = await fetch(FINGERPRINT_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(fp),
        });
        log('fingerprint sent', { status: r.status });
      } catch (e) {
        log('fingerprint send failed', { error: String(e) });
      }
    }

    async function main() {
      const parsed = parseUrl();
      $('url-dump').textContent = JSON.stringify(parsed, null, 2);
      log('parsed url', parsed);

      if (!parsed.stationCode) {
        setStatus('Не нашёл код станции в URL. Ожидаю ?s=<code> или /station/<code>.', 'error');
        return;
      }

      setStatus(`Станция: ${parsed.stationCode}. Собираем данные…`);

      const fp = await collectFingerprint(parsed.stationCode);
      $('fp-dump').textContent = JSON.stringify(fp, null, 2);
      log('fingerprint collected', { ip: fp.ip, platform: fp.platform });

      await sendFingerprintToBackend(fp);

      const platform = fp.platform;
      $('btn-open').onclick = () => openInApp(parsed.stationCode);
      $('btn-store').onclick = goToStore;

      if (platform === 'other') {
        setStatus('Открой эту ссылку с телефона, чтобы перейти в приложение.', 'error');
        return;
      }

      setStatus(`Пробуем открыть приложение… Если не откроется — нажми «Скачать».`, 'ok');

      let appLikelyOpened = false;
      const markAppOpened = (reason) => {
        if (appLikelyOpened) return;
        appLikelyOpened = true;
        log('app open signal detected — cancel store redirect', { reason });
      };

      const onVisibility = () => {
        if (document.visibilityState === 'hidden') markAppOpened('visibility');
      };
      const onBlur = () => markAppOpened('blur');
      const onPageHide = () => markAppOpened('pagehide');

      document.addEventListener('visibilitychange', onVisibility);
      window.addEventListener('blur', onBlur);
      window.addEventListener('pagehide', onPageHide);

      setTimeout(() => openInApp(parsed.stationCode), 300);

      setTimeout(() => {
        document.removeEventListener('visibilitychange', onVisibility);
        window.removeEventListener('blur', onBlur);
        window.removeEventListener('pagehide', onPageHide);

        if (appLikelyOpened) {
          log('not redirecting to store — app opened');
          return;
        }
        log('no app detected — going to store');
        goToStore();
      }, 2200);
    }

    main();
  </script>
</body>
</html>
